apiVersion: apps/v1
kind: Deployment
metadata:
  name: angular-frontend
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: angular-frontend
  template:
    metadata:
      labels:
        app: angular-frontend
    spec:
      containers:
      - name: angular-frontend
        image: 10.98.196.224:80/angular-frontend:18086e9fa6fd50b9d7eb844717d9222e63371813
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: angular-frontend-svc
  namespace: apps
spec:
  selector:
    app: angular-frontend
  ports:
  - port: 80
    targetPort: 80
