apiVersion: apps/v1
kind: Deployment
metadata:
  name: angular-frontend
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: angular-frontend
  template:
    metadata:
      labels:
        app: angular-frontend
    spec:
      containers:
      - name: angular-frontend
        image: 10.98.196.224:80/angular-frontend:d468d192bda0821834c9248bc9b7e98be094d2f6
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: angular-frontend-svc
  namespace: apps
spec:
  selector:
    app: angular-frontend
  ports:
  - port: 80
    targetPort: 80
